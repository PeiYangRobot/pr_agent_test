name: AI Code Review (DeepSeek)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event.pull_request.head.repo.fork
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          gh pr diff $PR_NUMBER > pr.diff
          echo "diff_length=$(wc -c < pr.diff)" >> $GITHUB_OUTPUT

      - name: Install Python dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Analyze diff with DeepSeek
        id: analyze
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          echo "Key length: ${#DEEPSEEK_API_KEY}"
          head -c 40000 pr.diff > diff_to_review.txt
          python .github/scripts/ai_review.py diff_to_review.txt > review_output.md
          {
            echo 'review_body<<EOF'
            cat review_output.md
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Post review comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const reviewBody = `${{ steps.analyze.outputs.review_body }}`;
            if (reviewBody.trim()) {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                body: reviewBody,
                event: 'COMMENT'
              });
            }